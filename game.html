<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroLab - Play</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- JS -->
    <script src="assets/js/main.js" defer></script>
  </head>

  <body>
    <nav>
      <h1><a href="index.html" class="header-link" aria-label="NeuroLab home page">NeuroLab</a></h1>

      <div class="burger" id="burger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <ul id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="game.html">Play</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>

    <main>
      <section class="game-area">
        <h2>Visual Recall Challenge</h2>
        <p>Memorise the highlighted squares before they disappear.</p>

        <!-- Wrapper for buttons + grid for smooth slide -->
        <div id="gameControlsWrapper">

          <div class="difficulty" aria-label="Select game difficulty level">
            <button class="diffBtn" data-size="9" aria-label="Easy difficulty">Easy</button>
            <button class="diffBtn" data-size="16" aria-label="Medium difficulty">Medium</button>
            <button class="diffBtn" data-size="25" aria-label="Hard difficulty">Hard</button>
          </div>

          <div class="controls" aria-label="Game controls">
            <button id="startBtn" class="btn" aria-label="Start round">Start Round</button>
          </div>

          <p id="roundDisplay" aria-label="Current round" style="display: none;"></p>

          <div class="grid-wrapper" aria-label="Memory grid">
            <div id="gridContainer" data-size="9" aria-label="Memory squares grid"></div>
          </div>

        </div>

        <p id="message"></p>
      </section>
    </main>

  </body>
</html>
