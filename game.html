<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroLab - Play</title>

    <!--Favicons generated by favicon.io, image downloaded was free to use and share-->
    <!--Logo was generated by Perchance.org using its AI Text to Image Generator-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/favicon-16x16.png"
    />

    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!--jQuery CDN-->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!--Confetti-->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!--JS-->
    <script src="assets/js/main.js" defer></script>
  </head>

  <body>
    <div id="crt-overlay"></div>
    <nav>
      <h1>
        <a href="index.html" class="header-link" aria-label="NeuroLab home page"
          >NeuroLab</a
        >
      </h1>

      <div class="burger" id="burger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <ul id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="game.html">Play</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>

    <main>
      <section class="game-area">
        <h2>Visual Recall Challenge</h2>
        <p>Memorise the highlighted squares before they disappear.</p>

        <!--Wrapper for buttons + grid for smooth slide-->
        <div id="gameControlsWrapper">
          <!--Difficulty buttons group-->
          <div
            class="difficulty"
            role="group"
            aria-label="Select game difficulty level"
          >
            <button class="diffBtn" data-size="9" aria-label="Easy difficulty">
              Easy
            </button>
            <button
              class="diffBtn"
              data-size="16"
              aria-label="Medium difficulty"
            >
              Medium
            </button>
            <button class="diffBtn" data-size="25" aria-label="Hard difficulty">
              Hard
            </button>
          </div>

          <!--Game controls-->
          <div class="controls" role="group" aria-label="Game controls">
            <button id="startBtn" class="btn" aria-label="Start round">
              Start Round
            </button>
          </div>

          <!--Current round display-->
          <p id="roundDisplay" role="status" style="display: none"></p>

          <!--Feedback message-->
          <p id="message"></p>

          <!--Memory grid-->
          <div class="grid-wrapper">
            <div
              id="gridContainer"
              role="grid"
              aria-label="Memory squares grid"
              data-size="9"
            ></div>
          </div>
        </div>
      </section>
    </main>

    <!--Sound Effects-->
    <audio id="soundCorrect" preload="auto">
      <source src="assets/sounds/correct.mp3" type="audio/mpeg" />
    </audio>

    <audio id="soundFail" preload="auto">
      <source src="assets/sounds/fail.mp3" type="audio/mpeg" />
    </audio>

    <audio id="soundBoss" preload="auto">
      <source src="assets/sounds/boss.mp3" type="audio/mpeg" />
    </audio>

    <audio id="soundVictory" preload="auto">
      <source src="assets/sounds/victory.mp3" type="audio/mpeg" />
    </audio>
  </body>
</html>
